services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiver_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ${WORDLISTS_PATH:-./data/wordlists}:/wordlists:ro
    environment:
      - DATABASE_URL=sqlite:////data/pentest.db
      - WORDLISTS_DIR=/wordlists
    privileged: true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiver_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  juice-shop:
    image: bkimminich/juice-shop
    container_name: quiver_juiceshop
    ports:
      - "3001:3000"
    restart: unless-stopped

